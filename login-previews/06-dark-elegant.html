<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login #6 — 深色優雅</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --linen: #f8f3eb; --espresso: #1e0f08; --espresso-light: #5c3d2e;
    --rose: #c4506a; --rose-dark: #a03050; --wine: #4a1828;
    --rose-muted: #c4506a33;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Outfit', system-ui, sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--wine);
    background-image: radial-gradient(ellipse at 30% 20%, rgba(196,80,106,0.15) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, rgba(200,149,48,0.08) 0%, transparent 50%);
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 100%; max-width: 400px; padding: 52px 44px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    backdrop-filter: blur(20px);
    animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .logo {
    font-family: 'Outfit', sans-serif; font-weight: 300; font-style: italic;
    font-size: 1.8rem; color: var(--rose); text-align: center;
    margin-bottom: 4px;
  }
  .tagline {
    text-align: center; font-size: 0.7rem; letter-spacing: 0.25em;
    text-transform: uppercase; color: rgba(255,255,255,0.3);
    margin-bottom: 40px;
  }
  h1 {
    font-family: 'Noto Serif TC', serif; font-size: 1.75rem; font-weight: 700;
    color: var(--linen); text-align: center; margin-bottom: 6px;
  }
  .desc {
    text-align: center; font-size: 0.8125rem;
    color: rgba(255,255,255,0.4); margin-bottom: 36px;
  }
  label {
    display: block; font-size: 0.8125rem; font-weight: 500;
    margin-bottom: 8px; color: rgba(255,255,255,0.6);
  }
  input {
    width: 100%; border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.06); border-radius: 10px;
    padding: 14px 16px; font-size: 0.9375rem;
    color: var(--linen); outline: none;
    transition: all 0.2s;
  }
  input:focus {
    border-color: var(--rose); background: rgba(255,255,255,0.1);
    box-shadow: 0 0 0 3px var(--rose-muted);
  }
  input::placeholder { color: rgba(255,255,255,0.2); }
  .field { margin-bottom: 20px; }
  .forgot { text-align: right; margin-top: 6px; }
  .forgot a { font-size: 0.75rem; color: rgba(255,255,255,0.3); text-decoration: none; }
  .forgot a:hover { color: var(--rose); }
  .btn {
    width: 100%; padding: 16px;
    background: var(--rose); color: white;
    border: none; border-radius: 10px;
    font-size: 0.9375rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    margin-top: 8px;
    box-shadow: 0 4px 20px rgba(196,80,106,0.4);
  }
  .btn:hover { background: var(--rose-dark); box-shadow: 0 6px 28px rgba(196,80,106,0.5); }
  .btn:active { transform: scale(0.97); }
  .bottom {
    text-align: center; font-size: 0.875rem;
    color: rgba(255,255,255,0.35); margin-top: 28px;
  }
  .bottom a { color: var(--rose); font-weight: 500; text-decoration: none; }
  .tag { position: fixed; top: 16px; left: 16px; background: white; color: var(--espresso); padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; z-index: 10; }
</style>
</head>
<body>
<div class="tag">#6 深色優雅（Dark Mode）</div>
<div class="card">
  <div class="logo">Jam For Love</div>
  <div class="tagline">Handmade with Love</div>
  <h1>歡迎回來</h1>
  <p class="desc">登入以查看訂單或訂購果醬</p>
  <form>
    <div class="field"><label>帳號</label><input type="text" placeholder="請輸入帳號"></div>
    <div class="field"><label>密碼</label><input type="password" placeholder="請輸入密碼"><div class="forgot"><a href="#">忘記密碼？</a></div></div>
    <button class="btn" type="button">登入</button>
  </form>
  <p class="bottom">還沒有帳號？ <a href="#">註冊</a></p>
</div>
</body>
</html>
