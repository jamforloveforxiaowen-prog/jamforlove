<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login #8 — 浮動卡片</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --linen: #f8f3eb; --linen-dark: #ebe2d4; --espresso: #1e0f08;
    --espresso-light: #5c3d2e; --rose: #c4506a; --rose-dark: #a03050;
    --rose-muted: #c4506a1a; --honey: #c89530; --sage: #5a7c52;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Outfit', system-ui, sans-serif;
    min-height: 100vh; background: var(--rose);
    display: flex; align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased;
    position: relative; overflow: hidden;
  }
  /* 浮動水果裝飾 */
  .fruit {
    position: absolute; font-size: 2rem; opacity: 0.15;
    animation: floatFruit 6s ease-in-out infinite;
  }
  .fruit:nth-child(1) { top: 10%; left: 8%; animation-delay: 0s; font-size: 3rem; }
  .fruit:nth-child(2) { top: 25%; right: 12%; animation-delay: 1s; }
  .fruit:nth-child(3) { bottom: 20%; left: 15%; animation-delay: 2s; font-size: 2.5rem; }
  .fruit:nth-child(4) { bottom: 10%; right: 8%; animation-delay: 0.5s; }
  .fruit:nth-child(5) { top: 50%; left: 5%; animation-delay: 3s; }
  .fruit:nth-child(6) { top: 60%; right: 5%; animation-delay: 1.5s; font-size: 2.5rem; }
  @keyframes floatFruit {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(5deg); }
  }
  .card {
    position: relative; z-index: 1;
    width: 100%; max-width: 400px; padding: 48px 40px;
    background: white; border-radius: 24px;
    box-shadow: 0 32px 80px rgba(74,24,40,0.3);
    animation: cardIn 0.8s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .logo-badge {
    width: 64px; height: 64px; border-radius: 16px;
    background: linear-gradient(135deg, var(--rose), var(--rose-dark));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px; box-shadow: 0 4px 16px rgba(196,80,106,0.3);
    font-size: 1.8rem;
  }
  h1 {
    font-family: 'Noto Serif TC', serif; font-size: 1.75rem; font-weight: 700;
    color: var(--espresso); text-align: center; margin-bottom: 4px;
  }
  .desc {
    text-align: center; font-size: 0.8125rem;
    color: var(--espresso-light); opacity: 0.5;
    margin-bottom: 32px;
  }
  label { display: block; font-size: 0.8125rem; font-weight: 500; margin-bottom: 8px; color: var(--espresso); }
  input {
    width: 100%; border: 1.5px solid var(--linen-dark);
    background: var(--linen); border-radius: 12px;
    padding: 14px 16px; font-size: 0.9375rem;
    color: var(--espresso); outline: none; transition: all 0.2s;
  }
  input:focus { border-color: var(--rose); box-shadow: 0 0 0 3px var(--rose-muted); background: white; }
  .field { margin-bottom: 20px; }
  .forgot { text-align: right; margin-top: 6px; }
  .forgot a { font-size: 0.75rem; color: var(--espresso-light); opacity: 0.4; text-decoration: none; }
  .btn {
    width: 100%; padding: 16px;
    background: var(--espresso); color: white;
    border: none; border-radius: 12px;
    font-size: 0.9375rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; margin-top: 8px;
  }
  .btn:hover { background: var(--rose); box-shadow: 0 4px 20px rgba(196,80,106,0.25); }
  .btn:active { transform: scale(0.97); }
  .bottom { text-align: center; font-size: 0.875rem; color: var(--espresso-light); opacity: 0.5; margin-top: 28px; }
  .bottom a { color: var(--rose); font-weight: 500; text-decoration: none; }
  .tag { position: fixed; top: 16px; left: 16px; background: white; color: var(--espresso); padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; z-index: 10; }
</style>
</head>
<body>
<div class="tag">#8 玫瑰底 + 浮動水果</div>
<div class="fruit">🍓</div>
<div class="fruit">🫐</div>
<div class="fruit">🍑</div>
<div class="fruit">🍊</div>
<div class="fruit">🍇</div>
<div class="fruit">🍒</div>
<div class="card">
  <div class="logo-badge">🍓</div>
  <h1>歡迎回來</h1>
  <p class="desc">登入以查看訂單或訂購果醬</p>
  <form>
    <div class="field"><label>帳號</label><input type="text"></div>
    <div class="field"><label>密碼</label><input type="password"><div class="forgot"><a href="#">忘記密碼？</a></div></div>
    <button class="btn" type="button">登入</button>
  </form>
  <p class="bottom">還沒有帳號？ <a href="#">註冊</a></p>
</div>
</body>
</html>
