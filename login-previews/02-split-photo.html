<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login #2 — 左圖右表單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --linen: #f8f3eb; --linen-dark: #ebe2d4; --espresso: #1e0f08;
    --espresso-light: #5c3d2e; --rose: #c4506a; --rose-dark: #a03050;
    --rose-muted: #c4506a1a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Outfit', system-ui, sans-serif;
    min-height: 100vh; display: flex;
    -webkit-font-smoothing: antialiased;
  }
  .photo-side {
    width: 50%; position: relative; overflow: hidden;
    background: linear-gradient(135deg, #c4506a 0%, #a03050 50%, #4a1828 100%);
  }
  .photo-side img {
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0.3; mix-blend-mode: multiply;
  }
  .photo-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: flex-end; padding: 60px;
  }
  .photo-overlay h2 {
    font-family: 'Outfit', sans-serif;
    font-weight: 300; font-style: italic;
    font-size: 3.5rem; color: white;
    line-height: 0.9; margin-bottom: 16px;
  }
  .photo-overlay p {
    color: rgba(255,255,255,0.6); font-size: 0.875rem;
    letter-spacing: 0.15em; text-transform: uppercase;
  }
  .photo-dots {
    position: absolute; top: 40px; left: 60px;
    display: grid; grid-template-columns: repeat(5,8px); gap: 12px;
  }
  .photo-dots span {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }
  .form-side {
    width: 50%; display: flex; align-items: center;
    justify-content: center; padding: 40px;
    background: white;
  }
  .form-wrap {
    width: 100%; max-width: 380px;
    animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 2rem; font-weight: 700;
    margin-bottom: 8px; color: var(--espresso);
  }
  .desc { font-size: 0.875rem; color: var(--espresso-light); opacity: 0.5; margin-bottom: 40px; }
  label { display: block; font-size: 0.8125rem; font-weight: 500; margin-bottom: 8px; color: var(--espresso); }
  input {
    width: 100%; border: 1.5px solid var(--linen-dark);
    background: var(--linen); border-radius: 8px;
    padding: 14px 16px; font-size: 0.9375rem;
    color: var(--espresso); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus { border-color: var(--rose); box-shadow: 0 0 0 3px var(--rose-muted); background: white; }
  .field { margin-bottom: 20px; }
  .forgot { text-align: right; margin-top: 6px; }
  .forgot a { font-size: 0.75rem; color: var(--espresso-light); opacity: 0.5; text-decoration: none; }
  .forgot a:hover { color: var(--rose); opacity: 1; }
  .btn {
    width: 100%; padding: 16px;
    background: var(--rose); color: white;
    border: none; border-radius: 8px;
    font-size: 0.9375rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    margin-top: 8px;
  }
  .btn:hover { background: var(--rose-dark); box-shadow: 0 4px 20px rgba(196,80,106,0.25); }
  .btn:active { transform: scale(0.97); }
  .bottom { text-align: center; font-size: 0.875rem; color: var(--espresso-light); opacity: 0.6; margin-top: 32px; }
  .bottom a { color: var(--rose); font-weight: 500; text-decoration: none; }
  .tag { position: fixed; top: 16px; right: 16px; background: var(--espresso); color: white; padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; z-index: 10; }
  @media (max-width: 768px) {
    .photo-side { display: none; }
    .form-side { width: 100%; background: var(--linen); }
  }
</style>
</head>
<body>
<div class="tag">#2 左圖右表單（果醬意象）</div>
<div class="photo-side">
  <img src="https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=800" alt="jam">
  <div class="photo-dots">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="photo-overlay">
    <h2>Jam<br>For Love</h2>
    <p>Handmade with Love &middot; 2025</p>
  </div>
</div>
<div class="form-side">
  <div class="form-wrap">
    <h1>歡迎回來</h1>
    <p class="desc">登入以查看訂單或訂購果醬</p>
    <form>
      <div class="field"><label>帳號</label><input type="text"></div>
      <div class="field"><label>密碼</label><input type="password"><div class="forgot"><a href="#">忘記密碼？</a></div></div>
      <button class="btn" type="button">登入</button>
    </form>
    <p class="bottom">還沒有帳號？ <a href="#">註冊</a></p>
  </div>
</div>
</body>
</html>
