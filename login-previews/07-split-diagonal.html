<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login #7 — 斜切分割</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --linen: #f8f3eb; --linen-dark: #ebe2d4; --espresso: #1e0f08;
    --espresso-light: #5c3d2e; --rose: #c4506a; --rose-dark: #a03050;
    --rose-muted: #c4506a1a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Outfit', system-ui, sans-serif;
    min-height: 100vh; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .bg-rose {
    position: fixed; inset: 0;
    background: var(--rose);
    clip-path: polygon(0 0, 60% 0, 40% 100%, 0 100%);
    z-index: 0;
  }
  .bg-rose::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 60%, rgba(255,255,255,0.12) 0%, transparent 50%);
  }
  .bg-linen {
    position: fixed; inset: 0;
    background: var(--linen);
    clip-path: polygon(60% 0, 100% 0, 100% 100%, 40% 100%);
    z-index: 0;
  }
  .brand-area {
    position: fixed; left: 0; top: 0; bottom: 0; width: 40%;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    z-index: 1; padding: 40px;
  }
  .brand-area h2 {
    font-family: 'Outfit', sans-serif; font-weight: 300; font-style: italic;
    font-size: 3rem; color: white; line-height: 0.9;
    text-align: center; margin-bottom: 12px;
  }
  .brand-area p {
    color: rgba(255,255,255,0.5); font-size: 0.75rem;
    letter-spacing: 0.25em; text-transform: uppercase;
  }
  .form-area {
    position: fixed; right: 0; top: 0; bottom: 0; width: 55%;
    display: flex; align-items: center; justify-content: center;
    z-index: 1; padding: 40px;
  }
  .form-wrap {
    width: 100%; max-width: 380px;
    animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  h1 {
    font-family: 'Noto Serif TC', serif; font-size: 2rem; font-weight: 700;
    color: var(--espresso); margin-bottom: 8px;
  }
  .desc { font-size: 0.875rem; color: var(--espresso-light); opacity: 0.5; margin-bottom: 40px; }
  label { display: block; font-size: 0.8125rem; font-weight: 500; margin-bottom: 8px; color: var(--espresso); }
  input {
    width: 100%; border: 1.5px solid var(--linen-dark);
    background: white; border-radius: 10px;
    padding: 14px 16px; font-size: 0.9375rem;
    color: var(--espresso); outline: none; transition: all 0.2s;
  }
  input:focus { border-color: var(--rose); box-shadow: 0 0 0 3px var(--rose-muted); }
  .field { margin-bottom: 20px; }
  .forgot { text-align: right; margin-top: 6px; }
  .forgot a { font-size: 0.75rem; color: var(--espresso-light); opacity: 0.4; text-decoration: none; }
  .btn {
    width: 100%; padding: 16px;
    background: var(--rose); color: white;
    border: none; border-radius: 10px;
    font-size: 0.9375rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; margin-top: 8px;
  }
  .btn:hover { background: var(--rose-dark); }
  .btn:active { transform: scale(0.97); }
  .bottom { text-align: center; font-size: 0.875rem; color: var(--espresso-light); opacity: 0.5; margin-top: 32px; }
  .bottom a { color: var(--rose); font-weight: 500; text-decoration: none; }
  .tag { position: fixed; top: 16px; right: 16px; background: var(--espresso); color: white; padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; z-index: 10; }
  @media (max-width: 768px) {
    .bg-rose { clip-path: polygon(0 0, 100% 0, 100% 35%, 0 45%); }
    .bg-linen { clip-path: polygon(0 45%, 100% 35%, 100% 100%, 0 100%); }
    .brand-area { width: 100%; height: 35%; position: fixed; top: 0; left: 0; right: 0; bottom: auto; }
    .form-area { width: 100%; position: fixed; top: 38%; bottom: 0; left: 0; right: 0; overflow-y: auto; }
  }
</style>
</head>
<body>
<div class="tag">#7 斜切分割</div>
<div class="bg-rose"></div>
<div class="bg-linen"></div>
<div class="brand-area">
  <h2>Jam<br>For<br>Love</h2>
  <p>Handmade with Love</p>
</div>
<div class="form-area">
  <div class="form-wrap">
    <h1>歡迎回來</h1>
    <p class="desc">登入以查看訂單或訂購果醬</p>
    <form>
      <div class="field"><label>帳號</label><input type="text"></div>
      <div class="field"><label>密碼</label><input type="password"><div class="forgot"><a href="#">忘記密碼？</a></div></div>
      <button class="btn" type="button">登入</button>
    </form>
    <p class="bottom">還沒有帳號？ <a href="#">註冊</a></p>
  </div>
</div>
</body>
</html>
