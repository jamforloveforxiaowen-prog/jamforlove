<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login #5 — 暖色漸層</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --linen: #f8f3eb; --linen-dark: #ebe2d4; --espresso: #1e0f08;
    --espresso-light: #5c3d2e; --rose: #c4506a; --rose-dark: #a03050;
    --rose-muted: #c4506a1a; --honey: #c89530; --sage: #5a7c52;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Outfit', system-ui, sans-serif;
    min-height: 100vh;
    background: linear-gradient(160deg, var(--linen) 0%, #f2ead8 40%, #ebe2d4 100%);
    display: flex; align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }
  /* 裝飾圖案 */
  .deco-circle {
    position: absolute; border-radius: 50%; border: 1px solid var(--linen-dark);
  }
  .deco-1 { width: 500px; height: 500px; top: -200px; right: -100px; }
  .deco-2 { width: 300px; height: 300px; bottom: -100px; left: -80px; }
  .deco-3 { width: 120px; height: 120px; top: 30%; left: 15%; border-color: var(--rose); opacity: 0.15; }

  .card {
    position: relative; z-index: 1;
    width: 100%; max-width: 420px; padding: 52px 44px;
    background: white;
    border-radius: 28px;
    box-shadow: 0 24px 80px rgba(30,15,8,0.08), 0 2px 12px rgba(30,15,8,0.04);
    animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .emoji-icon { font-size: 2.5rem; margin-bottom: 20px; }
  h1 {
    font-family: 'Noto Serif TC', serif; font-size: 1.75rem; font-weight: 700;
    color: var(--espresso); margin-bottom: 6px;
  }
  .desc { font-size: 0.8125rem; color: var(--espresso-light); opacity: 0.5; margin-bottom: 36px; }
  label { display: block; font-size: 0.8125rem; font-weight: 500; margin-bottom: 8px; color: var(--espresso); }
  .input-wrap {
    position: relative; margin-bottom: 20px;
  }
  .input-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 1.1rem; opacity: 0.4;
  }
  input {
    width: 100%; border: 1.5px solid var(--linen-dark);
    background: var(--linen); border-radius: 14px;
    padding: 14px 16px 14px 42px; font-size: 0.9375rem;
    color: var(--espresso); outline: none;
    transition: all 0.2s;
  }
  input:focus { border-color: var(--rose); box-shadow: 0 0 0 3px var(--rose-muted); background: white; }
  .forgot { text-align: right; margin-top: -12px; margin-bottom: 8px; }
  .forgot a { font-size: 0.75rem; color: var(--espresso-light); opacity: 0.4; text-decoration: none; }
  .forgot a:hover { color: var(--rose); opacity: 1; }
  .btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--rose), var(--rose-dark));
    color: white; border: none; border-radius: 14px;
    font-size: 0.9375rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(196,80,106,0.3);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(196,80,106,0.35); }
  .btn:active { transform: scale(0.97) translateY(0); }
  .bottom { text-align: center; font-size: 0.875rem; color: var(--espresso-light); opacity: 0.5; margin-top: 28px; }
  .bottom a { color: var(--rose); font-weight: 500; text-decoration: none; }
  .brand-footer {
    text-align: center; margin-top: 24px; padding-top: 20px;
    border-top: 1px solid var(--linen-dark);
  }
  .brand-footer span {
    font-family: 'Outfit', sans-serif; font-weight: 300; font-style: italic;
    font-size: 0.875rem; color: var(--espresso-light); opacity: 0.4;
  }
  .tag { position: fixed; top: 16px; left: 16px; background: var(--espresso); color: white; padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; z-index: 10; }
</style>
</head>
<body>
<div class="tag">#5 暖色漸層 + 圓角卡片</div>
<div class="deco-circle deco-1"></div>
<div class="deco-circle deco-2"></div>
<div class="deco-circle deco-3"></div>
<div class="card">
  <div class="emoji-icon">🍓</div>
  <h1>歡迎回來</h1>
  <p class="desc">登入以查看訂單或訂購果醬</p>
  <form>
    <div class="input-wrap">
      <span class="input-icon">👤</span>
      <input type="text" placeholder="帳號">
    </div>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input type="password" placeholder="密碼">
    </div>
    <div class="forgot"><a href="#">忘記密碼？</a></div>
    <button class="btn" type="button">登入</button>
  </form>
  <p class="bottom">還沒有帳號？ <a href="#">註冊</a></p>
  <div class="brand-footer"><span>Jam For Love</span></div>
</div>
</body>
</html>
