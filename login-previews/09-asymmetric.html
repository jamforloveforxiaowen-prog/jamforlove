<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login #9 — 不對稱佈局</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --linen: #f8f3eb; --linen-dark: #ebe2d4; --espresso: #1e0f08;
    --espresso-light: #5c3d2e; --rose: #c4506a; --rose-dark: #a03050;
    --rose-muted: #c4506a1a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Outfit', system-ui, sans-serif;
    min-height: 100vh; background: white;
    -webkit-font-smoothing: antialiased;
  }
  .layout {
    display: grid; grid-template-columns: 1fr 480px;
    min-height: 100vh;
  }
  .left {
    background: var(--linen);
    display: flex; flex-direction: column;
    justify-content: space-between; padding: 48px 60px;
    position: relative; overflow: hidden;
  }
  .left::after {
    content: ''; position: absolute;
    width: 300px; height: 300px; border-radius: 50%;
    background: var(--rose); opacity: 0.05;
    bottom: -100px; right: -100px;
  }
  .left-top {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-dot {
    width: 10px; height: 10px; border-radius: 50%; background: var(--rose);
  }
  .logo-name {
    font-family: 'Outfit', sans-serif; font-weight: 300; font-style: italic;
    font-size: 1rem; color: var(--espresso-light);
  }
  .left-center {
    max-width: 400px;
  }
  .big-text {
    font-family: 'Noto Serif TC', serif;
    font-size: 3.5rem; font-weight: 700;
    line-height: 1.15; color: var(--espresso);
    margin-bottom: 20px;
  }
  .big-text span { color: var(--rose); }
  .left-desc {
    font-size: 1rem; color: var(--espresso-light); opacity: 0.5;
    line-height: 1.7;
  }
  .left-bottom {
    font-size: 0.75rem; color: var(--espresso-light); opacity: 0.3;
    letter-spacing: 0.1em;
  }
  .right {
    display: flex; align-items: center; justify-content: center;
    padding: 48px;
  }
  .form-wrap {
    width: 100%; max-width: 360px;
    animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .form-label {
    font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--rose); font-weight: 600; margin-bottom: 8px;
  }
  h1 {
    font-family: 'Noto Serif TC', serif; font-size: 1.5rem; font-weight: 700;
    color: var(--espresso); margin-bottom: 6px;
  }
  .desc { font-size: 0.8125rem; color: var(--espresso-light); opacity: 0.5; margin-bottom: 36px; }
  label { display: block; font-size: 0.8125rem; font-weight: 500; margin-bottom: 8px; color: var(--espresso); }
  input {
    width: 100%; border: 1.5px solid var(--linen-dark);
    background: var(--linen); border-radius: 8px;
    padding: 14px 16px; font-size: 0.9375rem;
    color: var(--espresso); outline: none; transition: all 0.2s;
  }
  input:focus { border-color: var(--rose); box-shadow: 0 0 0 3px var(--rose-muted); background: white; }
  .field { margin-bottom: 20px; }
  .forgot { text-align: right; margin-top: 6px; }
  .forgot a { font-size: 0.75rem; color: var(--espresso-light); opacity: 0.4; text-decoration: none; }
  .btn {
    width: 100%; padding: 16px;
    background: var(--rose); color: white;
    border: none; border-radius: 8px;
    font-size: 0.9375rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; margin-top: 8px;
  }
  .btn:hover { background: var(--rose-dark); }
  .btn:active { transform: scale(0.97); }
  .bottom { text-align: center; font-size: 0.875rem; color: var(--espresso-light); opacity: 0.5; margin-top: 28px; }
  .bottom a { color: var(--rose); font-weight: 500; text-decoration: none; }
  .tag { position: fixed; top: 16px; left: 16px; background: var(--espresso); color: white; padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; z-index: 10; }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .left { display: none; }
  }
</style>
</head>
<body>
<div class="tag">#9 不對稱佈局（大文案 + 表單）</div>
<div class="layout">
  <div class="left">
    <div class="left-top">
      <div class="logo-dot"></div>
      <span class="logo-name">Jam For Love</span>
    </div>
    <div class="left-center">
      <h2 class="big-text">
        用<span>愛</span>手工熬煮<br>每一瓶果醬
      </h2>
      <p class="left-desc">
        嚴選當季新鮮水果，不加人工色素與防腐劑，<br>
        每一口都是自然的甜蜜。
      </p>
    </div>
    <div class="left-bottom">© 2025 Jam For Love</div>
  </div>
  <div class="right">
    <div class="form-wrap">
      <div class="form-label">帳號登入</div>
      <h1>歡迎回來</h1>
      <p class="desc">登入以查看訂單或訂購果醬</p>
      <form>
        <div class="field"><label>帳號</label><input type="text"></div>
        <div class="field"><label>密碼</label><input type="password"><div class="forgot"><a href="#">忘記密碼？</a></div></div>
        <button class="btn" type="button">登入</button>
      </form>
      <p class="bottom">還沒有帳號？ <a href="#">註冊</a></p>
    </div>
  </div>
</div>
</body>
</html>
